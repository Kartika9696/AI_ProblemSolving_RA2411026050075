<!DOCTYPE html>
<html>
<head>
    <title>Disaster Evacuation Planner</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        #game-container { margin: 20px auto; width: 80%; background: white; padding: 20px; border-radius: 10px; }
        .bank { display: inline-block; width: 30%; min-height: 100px; border: 2px dashed #ccc; vertical-align: top; padding: 10px; }
        #river { display: inline-block; width: 20%; height: 100px; background: #3498db; color: white; line-height: 100px; font-weight: bold; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 5px; }
        #hint-box { margin-top: 15px; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div id-="game-container">
        <h1>Disaster Evacuation</h1>
        <div id="left-bank" class="bank"><h3>Left Bank</h3><div id="left-people"></div></div>
        <div id="river">BOAT</div>
        <div id="right-bank" class="bank"><h3>Right Bank</h3><div id="right-people"></div></div>
        
        <div class="controls">
            <p>Select who to move (Max 2):</p>
            <label><input type="checkbox" id="move-civ"> Civilian</label>
            <label><input type="checkbox" id="move-cri"> Criminal</label>
            <br><br>
            <button onclick="makeMove()">Cross River</button>
            <button onclick="getHint()" style="background:#34495e">Get AI Hint</button>
        </div>
        <div id="hint-box"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
